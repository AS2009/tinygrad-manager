name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app

      - name: Build .app with py2app
        run: |
          python setup.py py2app

      - name: Fix Pillow dynamic library paths
        run: |
          APP="dist/TinyGradManager.app"
          PIL_SO="$APP/Contents/Resources/lib/python3.11/PIL/_imaging.cpython-311-darwin.so"
          DYLIB_DEST="$APP/Contents/Resources/lib/python3.11/PIL/.dylibs"

          # 检测 Homebrew 前缀
          if [ -d "/opt/homebrew" ]; then
            BREW_PREFIX="/opt/homebrew"
          else
            BREW_PREFIX="/usr/local"
          fi

          # 安装所需库
          brew install libtiff jpeg libpng webp little-cms2 openjpeg || true

          mkdir -p "$DYLIB_DEST"

          # 复制库文件并记录实际名称
          copy_lib() {
            local libname=$1
            local src_dir=$2
            local src_file=$(ls "$src_dir"/${libname}*.dylib 2>/dev/null | head -1)
            if [ -n "$src_file" ]; then
              cp "$src_file" "$DYLIB_DEST/"
              echo "Copied $src_file -> $DYLIB_DEST/"
              echo $(basename "$src_file")
            else
              echo ""
            fi
          }

          TIFF_LIB=$(copy_lib "libtiff" "$BREW_PREFIX/opt/libtiff/lib/")
          JPEG_LIB=$(copy_lib "libjpeg" "$BREW_PREFIX/opt/jpeg/lib/")
          PNG_LIB=$(copy_lib "libpng" "$BREW_PREFIX/opt/libpng/lib/")
          WEBP_LIB=$(copy_lib "libwebp" "$BREW_PREFIX/opt/webp/lib/")
          LCMS_LIB=$(copy_lib "liblcms2" "$BREW_PREFIX/opt/little-cms2/lib/")
          OPENJP2_LIB=$(copy_lib "libopenjp2" "$BREW_PREFIX/opt/openjpeg/lib/")

          echo "=== Modifying $PIL_SO ==="
          # 显示当前引用
          otool -L "$PIL_SO" | head -20

          # 修正每个库的引用
          fix_ref() {
            local old_name=$1
            local new_name=$2
            if [ -n "$new_name" ]; then
              install_name_tool -change "@loader_path/.dylibs/$old_name" "@loader_path/.dylibs/$new_name" "$PIL_SO"
              echo "Changed $old_name -> $new_name"
            fi
          }

          fix_ref "libtiff.6.dylib" "$TIFF_LIB"
          fix_ref "libjpeg.8.dylib" "$JPEG_LIB"
          fix_ref "libpng16.16.dylib" "$PNG_LIB"
          fix_ref "libwebp.7.dylib" "$WEBP_LIB"
          fix_ref "liblcms2.2.dylib" "$LCMS_LIB"
          fix_ref "libopenjp2.7.dylib" "$OPENJP2_LIB"

          echo "=== After modification ==="
          otool -L "$PIL_SO" | head -20

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinyGradManager.app
          path: dist/TinyGradManager.app