name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app

      - name: Build .app with py2app
        run: |
          python setup.py py2app

      - name: Ad-hoc code sign the .app
        run: |
          APP="dist/TinyGradManager.app"
          xattr -cr "$APP"
          codesign --force --deep --sign - "$APP"
          codesign -dv "$APP"

      - name: Create DMG
        run: |
          APP="dist/TinyGradManager.app"
          DMG_NAME="TinyGradManager"
          DMG_FILE="dist/${DMG_NAME}.dmg"

          # 创建临时目录用于存放 .app
          TMP_DIR=$(mktemp -d)
          cp -R "$APP" "$TMP_DIR/"

          # 创建 DMG
          hdiutil create -volname "$DMG_NAME" -srcfolder "$TMP_DIR" -ov -format UDZO "$DMG_FILE"

          # 清理临时目录
          rm -rf "$TMP_DIR"

          echo "DMG created at $DMG_FILE"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinyGradManager.dmg
          path: dist/TinyGradManager.dmg