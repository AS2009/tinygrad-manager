name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app

      - name: Build .app with py2app
        run: |
          python setup.py py2app

      - name: Fix Pillow dynamic libraries (critical)
        run: |
          set -ex

          APP="dist/TinyGradManager.app"
          PIL_SO="$APP/Contents/Resources/lib/python3.11/PIL/_imaging.cpython-311-darwin.so"
          DYLIB_DEST="$APP/Contents/Resources/lib/python3.11/PIL/.dylibs"

          # 确定 Homebrew 前缀
          if [ -d "/opt/homebrew" ]; then
            BREW_PREFIX="/opt/homebrew"
          else
            BREW_PREFIX="/usr/local"
          fi

          # 安装所需系统库
          brew install libtiff libjpeg libpng webp little-cms2 openjpeg || true

          mkdir -p "$DYLIB_DEST"

          # 复制 libtiff
          TIFF_SRC=$(ls "$BREW_PREFIX/opt/libtiff/lib/libtiff."*.dylib | head -1)
          TIFF_NAME=$(basename "$TIFF_SRC")
          cp "$TIFF_SRC" "$DYLIB_DEST/"
          codesign --force --sign - "$DYLIB_DEST/$TIFF_NAME"

          # 复制 libjpeg
          JPEG_SRC=$(ls "$BREW_PREFIX/opt/jpeg/lib/libjpeg."*.dylib | head -1)
          JPEG_NAME=$(basename "$JPEG_SRC")
          cp "$JPEG_SRC" "$DYLIB_DEST/"
          codesign --force --sign - "$DYLIB_DEST/$JPEG_NAME"

          # 复制 libpng
          PNG_SRC=$(ls "$BREW_PREFIX/opt/libpng/lib/libpng"*.dylib | head -1)
          PNG_NAME=$(basename "$PNG_SRC")
          cp "$PNG_SRC" "$DYLIB_DEST/"
          codesign --force --sign - "$DYLIB_DEST/$PNG_NAME"

          # 复制 libwebp
          WEBP_SRC=$(ls "$BREW_PREFIX/opt/webp/lib/libwebp."*.dylib | head -1)
          WEBP_NAME=$(basename "$WEBP_SRC")
          cp "$WEBP_SRC" "$DYLIB_DEST/"
          codesign --force --sign - "$DYLIB_DEST/$WEBP_NAME"

          # 复制 liblcms2
          LCMS_SRC=$(ls "$BREW_PREFIX/opt/little-cms2/lib/liblcms2."*.dylib | head -1)
          LCMS_NAME=$(basename "$LCMS_SRC")
          cp "$LCMS_SRC" "$DYLIB_DEST/"
          codesign --force --sign - "$DYLIB_DEST/$LCMS_NAME"

          # 复制 libopenjp2
          OPENJP2_SRC=$(ls "$BREW_PREFIX/opt/openjpeg/lib/libopenjp2."*.dylib | head -1)
          OPENJP2_NAME=$(basename "$OPENJP2_SRC")
          cp "$OPENJP2_SRC" "$DYLIB_DEST/"
          codesign --force --sign - "$DYLIB_DEST/$OPENJP2_NAME"

          # 修正 _imaging.so 中的动态库引用
          install_name_tool -change "@loader_path/.dylibs/libtiff.6.dylib" "@loader_path/.dylibs/$TIFF_NAME" "$PIL_SO"
          install_name_tool -change "@loader_path/.dylibs/libjpeg.8.dylib" "@loader_path/.dylibs/$JPEG_NAME" "$PIL_SO"
          install_name_tool -change "@loader_path/.dylibs/libpng16.16.dylib" "@loader_path/.dylibs/$PNG_NAME" "$PIL_SO"
          install_name_tool -change "@loader_path/.dylibs/libwebp.7.dylib" "@loader_path/.dylibs/$WEBP_NAME" "$PIL_SO"
          install_name_tool -change "@loader_path/.dylibs/liblcms2.2.dylib" "@loader_path/.dylibs/$LCMS_NAME" "$PIL_SO"
          install_name_tool -change "@loader_path/.dylibs/libopenjp2.7.dylib" "@loader_path/.dylibs/$OPENJP2_NAME" "$PIL_SO"

          # 重新签名被修改的 .so
          codesign --force --sign - "$PIL_SO"

          # 使用 delocate 处理其他可能的扩展模块
          pip install delocate
          find "$APP/Contents/Resources" -name "*.so" -exec delocate-wheel -w "$APP/Contents/Resources/lib" -v {} \; 2>/dev/null || true

          # 清除扩展属性并整体深度签名
          xattr -cr "$APP"
          codesign --force --deep --sign - "$APP"
          codesign -dv "$APP"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinyGradManager.app
          path: dist/TinyGradManager.app