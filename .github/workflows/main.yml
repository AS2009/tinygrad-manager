name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app

  - name: Debug - Show file structure
  run: |
    echo "===== Current directory ====="
    pwd
    echo "===== Root files ====="
    ls -la
    echo "===== Check for TinyGradManager (case sensitive) ====="
    ls -la TinyGradManager || echo "TinyGradManager not found"
    echo "===== All directories (ignore case) ====="
    find . -maxdepth 1 -type d -iname "tinygrad*"

 - name: Build .app with py2app
        run: |
          python setup.py py2app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinyGradManager.app
          path: dist/TinyGradManager.app
